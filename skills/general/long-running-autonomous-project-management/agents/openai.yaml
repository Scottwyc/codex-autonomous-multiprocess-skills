display_name: Long-Running Autonomous Project Management
short_description: Sustained autonomous follow-up for projects that need monitoring, exploration, and repeated promotion decisions.
default_prompt: Use this skill when a project needs sustained autonomous follow-up. Keep the coordinator on short bounded checks, use tmux-managed Codex workers and supervisors for persistent parallel work, update status and exploration docs continuously, and derive a project-specific skill only when stable project rules justify it. When deriving, explicitly state the derived skill name and its specialization.
