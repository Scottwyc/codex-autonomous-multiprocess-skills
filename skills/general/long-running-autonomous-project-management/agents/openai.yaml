display_name: Long-Running Autonomous Project Management
short_description: Sustained autonomous follow-up with hierarchical tmux Codex workers.
default_prompt: Use this skill when a project needs sustained autonomous follow-up. Keep the coordinator on short bounded checks, use tmux-managed Codex workers by default, register tmux-hosted coordinators for recovery, use branch-manager workers for major experimental branches, use manager-mediated peer messages for front-line workers, update status and exploration docs continuously, and derive a project-specific skill only when stable project rules justify it. When deriving, explicitly state the derived skill name and its specialization.
